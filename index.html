<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title> Home-Organiser </title>
    </head>
    <body>
        <h1 id="main-heading"> WELCOME TO HOME ORGANISER</h1>

        <div class="container">

            <div class="expenses">
                <h2 class="heading"> EXPENSES </h2>
                <div class="e-input">
                    <input class="e-name" placeholder="Enter the name">
                    <input class="e-amnt" placeholder="Enter the amount">
                </div>
                <button class="e-add"> ADD </button>
                <ul class="e-list"></ul>
                <p class="e-total"></p>
            </div>

            <div class="tasks">
                <h2 class="heading"> TASKS </h2>
                <div class="t-input-row">
                    <input class="t-name" placeholder="Enter the task">
                    <button class="t-add"> ADD </button>
                </div>

                <ul class="t-list"></ul>
            </div>

        </div>

        <script src="script.js"></script>
    </body>


</html>
